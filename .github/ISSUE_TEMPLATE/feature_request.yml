name: Feature request
description: Suggest a rule, adapter, output format, or integration.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What migration safety problem should mguard solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the rule, behavior, or integration you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Rule engine
        - PostgreSQL parser
        - Database metadata
        - GitHub Action
        - Output format
        - Framework adapter
        - Documentation
    validations:
      required: true
