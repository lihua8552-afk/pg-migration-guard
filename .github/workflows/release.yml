name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          name="mguard_${GITHUB_REF_NAME}_${GOOS}_${GOARCH}"
          mkdir -p dist
          binary="dist/${name}/mguard"
          if [ "$GOOS" = "windows" ]; then
            binary="${binary}.exe"
          fi
          go build -trimpath -ldflags "-s -w -X main.version=${version}" -o "$binary" ./cmd/mguard
          cp README.md LICENSE "dist/${name}/"
          if [ "$GOOS" = "windows" ]; then
            (cd dist && zip -r "${name}.zip" "$name")
          else
            (cd dist && tar -czf "${name}.tar.gz" "$name")
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: mguard-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" artifacts/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" artifacts/* --generate-notes
          fi
